<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cari Serial TV - TV HUB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght=300;400;500;600;700&display=swap');
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #0b121f;
            color: #f1f5f9;
        }
        .glass-card {
            background: rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.3s ease;
        }
        .glass-card:hover {
            transform: translateY(-6px);
            border-color: #3b82f6;
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.2);
        }
    </style>
</head>
<body class="p-6 md:p-12">

    <div class="max-w-4xl mx-auto space-y-8">
        <div class="text-center space-y-2">
            <h1 class="text-3xl md:text-5xl font-extrabold tracking-tight bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">TV HUB SEARCH</h1>
            <p class="text-slate-400 text-sm md:text-base">Cari data Serial TV internasional langsung via TMDB API</p>
        </div>

        <div class="relative max-w-xl mx-auto">
            <input type="text" id="searchInput" placeholder="Masukkan judul serial TV... (Contoh: Fallout, Shogun)" 
                   class="w-full bg-slate-900/80 border border-white/10 text-white pl-12 pr-4 py-4 rounded-2xl focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all shadow-inner">
            <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg"></i>
        </div>

        <div id="resultsGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-6 pt-4">
            </div>
    </div>

    <script>
        const TMDB_API_KEY = "22be462e6d3de1dbab03d1ca50847b5a";
        const searchInput = document.getElementById('searchInput');
        const resultsGrid = document.getElementById('resultsGrid');
        let debounceTimer;

        // Fungsi pencarian ke API TMDB
        async function searchTV(query) {
            if (!query.trim()) {
                resultsGrid.innerHTML = '';
                return;
            }

            try {
                const response = await fetch(`https://api.themoviedb.org/3/search/tv?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(query)}&language=id-ID`);
                const data = await response.json();
                displayResults(data.results);
            } catch (error) {
                console.error("Gagal mengambil data pencarian:", error);
            }
        }

        // Fungsi menampilkan kartu hasil pencarian
        function displayResults(shows) {
            resultsGrid.innerHTML = '';

            if (!shows || shows.length === 0) {
                resultsGrid.innerHTML = `<div class="col-span-full text-center text-slate-500 py-12">Serial TV tidak ditemukan.</div>`;
                return;
            }

            shows.forEach(show => {
                const posterUrl = show.poster_path 
                    ? `https://image.tmdb.org/t/p/w500${show.poster_path}` 
                    : 'https://via.placeholder.com/500x750/1e293b/cbd5e1?text=No+Poster';
                
                const airYear = show.first_air_date ? show.first_air_date.split('-')[0] : 'TBA';

                const card = document.createElement('div');
                card.className = 'glass-card rounded-2xl overflow-hidden cursor-pointer flex flex-col h-full';
                card.onclick = () => {
                    // Mengirimkan ID asli TMDB ke halaman detail
                    window.location.href = `detail.html?id=${show.id}`;
                };

                card.innerHTML = `
                    <div class="relative aspect-[2/3] w-full overflow-hidden bg-slate-800">
                        <img src="${posterUrl}" alt="${show.name}" class="w-full h-full object-cover" loading="lazy">
                    </div>
                    <div class="p-4 flex flex-col flex-grow justify-between gap-2">
                        <h3 class="font-bold text-sm md:text-base text-white line-clamp-2 leading-snug">${show.name}</h3>
                        <div class="flex items-center justify-between text-xs text-slate-400 font-medium">
                            <span><i class="fa-solid fa-calendar-days mr-1 text-blue-400"></i>${airYear}</span>
                            <span><i class="fa-solid fa-star mr-1 text-yellow-500"></i>${show.vote_average.toFixed(1)}</span>
                        </div>
                    </div>
                `;
                resultsGrid.appendChild(card);
            });
        }

        // Listener input dengan metode Debounce (menunggu user selesai mengetik 500ms)
        searchInput.addEventListener('input', (e) => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                searchTV(e.target.value);
            }, 500);
        });
    </script>
</body>
</html>
